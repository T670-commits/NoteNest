{% extends 'base.html' %}
{% block nav_upload %}active{% endblock %}
{% block content %}
<style>
  .upload-page{max-width:580px;margin:0 auto;animation:fadeUp .4s ease;}
  .form-header{margin-bottom:1.8rem;}
  .form-header h1{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:700;letter-spacing:-.5px;}
  .form-header h1 span{color:var(--gold);font-style:italic;}
  .form-header p{color:var(--text-2);font-size:.88rem;margin-top:.3rem;}
  .form-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:2rem;display:flex;flex-direction:column;gap:1.2rem;box-shadow:0 8px 32px rgba(0,0,0,.12);}

  /* DROPZONE */
  .dropzone{border:2px dashed var(--border);border-radius:12px;padding:2.5rem 1.5rem;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
  .dropzone:hover,.dropzone.drag{border-color:var(--gold);background:var(--gold-dim);}
  .dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .dropzone-icon{font-size:2.2rem;margin-bottom:.6rem;opacity:.4;}
  .dropzone-text{font-size:.88rem;color:var(--text-2);}
  .dropzone-text strong{color:var(--gold);}
  .dropzone-hint{font-size:.75rem;color:var(--text-3);margin-top:.3rem;}
  .selected-file{font-size:.82rem;color:var(--green);margin-top:.5rem;font-weight:500;}

  .form-actions{display:flex;gap:.7rem;margin-top:.3rem;}
  .btn-submit{flex:1;background:var(--gold);color:#0c0b14;border:none;border-radius:10px;padding:.82rem;font-family:'Outfit',sans-serif;font-weight:600;font-size:.92rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.4rem;}
  .btn-submit:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 18px var(--gold-glow);}
  .btn-cancel{background:transparent;border:1px solid var(--border);color:var(--text-2);border-radius:10px;padding:.82rem 1.2rem;font-family:'Outfit',sans-serif;font-size:.92rem;cursor:pointer;transition:all .2s;}
  .btn-cancel:hover{border-color:var(--border-h);color:var(--text);}
</style>

<div class="upload-page">
  <div class="form-header">
    <h1>Upload a <span>File</span></h1>
    <p>Share documents, images, audio, video — anything you like.</p>
  </div>
  <div class="form-card">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <div style="display:flex;flex-direction:column;gap:1.1rem;">
        <div class="f-group">
          <label class="f-label">Title</label>
          <input class="f-input" type="text" name="title" placeholder="Give your file a title…" required autofocus>
        </div>
        <div class="f-group">
          <label class="f-label">Description <span style="color:var(--text-3);text-transform:none;font-weight:400;">(optional)</span></label>
          <textarea class="f-textarea" name="description" placeholder="Describe what this file is…"></textarea>
        </div>
        <div class="f-group">
          <label class="f-label">File</label>
          <div class="dropzone" id="dropzone">
            <input type="file" name="file" id="fileInput" required onchange="showFile(this)">
            <div class="dropzone-icon">📂</div>
            <div class="dropzone-text"><strong>Click to browse</strong> or drag & drop</div>
            <div class="dropzone-hint">All file types accepted — images, PDFs, audio, video, docs…</div>
            <div class="selected-file" id="selectedFile"></div>
          </div>
        </div>
        <div class="form-actions">
          <a href="/" class="btn-cancel">Cancel</a>
          <button type="submit" class="btn-submit">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
            Upload File
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
  function showFile(input){
    const label = document.getElementById('selectedFile');
    label.textContent = input.files[0] ? '✓ ' + input.files[0].name : '';
  }
  const dz = document.getElementById('dropzone');
  dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', ()=> dz.classList.remove('drag'));
  dz.addEventListener('drop', e=>{ e.preventDefault(); dz.classList.remove('drag'); });
</script>
{% endblock %}
